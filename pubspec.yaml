name: shellapp_codelabs
description: ShellApp クライアントテンプレート — UIDSL 駆動の Flutter アプリ雛形
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter
  shellapp_runtime:
    git:
      url: https://github.com/ease-link/FlutterShell.git
      path: shellapp_runtime_client
      ref: main
  http: any
  shared_preferences: any
  font_awesome_flutter: any
  flutter_svg: any
  google_fonts: any

dev_dependencies:
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/uidsl/screens/
    - assets/license.jwt
